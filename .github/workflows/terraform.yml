name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-infra
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      AWS_REGION: eu-west-1
      TF_VAR_aws_region: eu-west-1
      TF_INPUT: false
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug Terraform environment
        run: |
          echo "AWS_REGION=$AWS_REGION"
          echo "TF_VAR_aws_region=$TF_VAR_aws_region"
          echo "TF_INPUT=$TF_INPUT"
          echo "Using updated terraform workflow"

      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=5m

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m -out=tfplan -no-color

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        run: terraform apply -input=false -auto-approve tfplan